<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <!-- Cache busting lives in the ?v= stamps below, not in meta tags: browsers
       ignore http-equiv Cache-Control/Pragma/Expires entirely (they are not
       pragma directives in the HTML spec), and they never applied to
       subresources anyway. Run tools/stamp-version.ps1 before a release to
       re-stamp every asset and module URL in one pass. -->
  <title>SpeakScenes — English Speaking Practice</title>
  <link rel="stylesheet" href="css/styles.css?v=content109">
  <link rel="stylesheet" href="css/story.css?v=content109">
  <link rel="stylesheet" href="css/quick-practice.css?v=content109">
  <link rel="stylesheet" href="css/shorts.css?v=content109">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>">
</head>
<body>
  <div id="app">
    <main id="screen" tabindex="-1" aria-live="polite">
      <div class="boot-loading">
        <div class="boot-mic">🎙️</div>
        <p>Loading SpeakScenes…</p>
      </div>
    </main>
    <nav id="bottom-nav" class="bottom-nav" aria-label="Main navigation"></nav>
  </div>
  <script type="module" src="js/app.js?v=content109"></script>
  <noscript><p style="padding:2rem;color:#fff">SpeakScenes needs JavaScript enabled.</p></noscript>
</body>
</html>
